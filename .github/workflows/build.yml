name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 选择 Xcode 版本
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      
      - name: 显示 Xcode 版本
        run: xcodebuild -version

      - name: 显示可用 SDK
        run: xcodebuild -showsdks

      - name: 编译
        run: |
          xcodebuild \
            -project SensenovaQuota.xcodeproj \
            -scheme SensenovaQuota \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_ALLOWED=YES \
            ARCHS="arm64" \
            -derivedDataPath build \
            clean build

      - name: 打包 .app
        run: |
          # 找到编译产物
          APP_PATH=$(find build -name "*.app" -type d | head -1)
          echo "App path: $APP_PATH"
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ 未找到 .app 文件"
            exit 1
          fi
          
          # 显示 app 信息
          ls -la "$APP_PATH"
          
          # 打包为 zip（TrollStore 可以直接安装 .ipa 或解压 .app 通过 Filza 导入）
          cd "$(dirname "$APP_PATH")"
          APP_NAME=$(basename "$APP_PATH")
          zip -r "${APP_NAME}.zip" "$APP_NAME"
          
          # 同时打包为 .ipa（TrollStore 也能装）
          mkdir -p Payload
          cp -r "$APP_NAME" Payload/
          zip -r "../../../SensenovaQuota.ipa" Payload/
          rm -rf Payload
          
          echo "✅ 编译完成"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: SensenovaQuota
          path: |
            build/**/*.app.zip
            SensenovaQuota.ipa
          compression-level: 0
          if-no-files-found: error
